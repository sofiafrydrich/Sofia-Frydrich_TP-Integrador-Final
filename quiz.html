        <!-- ================= Quiz ================= -->
        <section class="quiz" id="quiz">
            <div class="quiz-contenido">
                <div class="quiz-pregunta">
                    <h1 id="pregunta"></h1>
                    <div class="respuestas">
                        <button class="respuesta"></button>
                        <button class="respuesta"></button>

                <div class="quiz-imagen">
                    <div class="circulo-icono">
                        <img src="Imagenes/cerebro.png" alt="Quiz">
                    </div>

                </div>
            </div>

        <script>
        const preguntas = [
            {
                pregunta: "¿Cuál es el planeta más cercano al Sol?",
                respuestas: ["Tierra", "Mercurio", "Marte", "Venus"],
                correcta: 1
            },
        
            {
                pregunta: "¿Cuál es el planeta más grande del Sistema Solar?",
                respuestas: ["Saturno", "Júpiter", "Neptuno", "Tierra"], 
                correcta: 1        
            },

            {
                pregunta: "¿Qué planeta es conocido como el planeta rojo?",
                respuestas: ["Venus", "Marte", "Urano", "Mercurio"],            
                correcta: 1        
            },

            {
                pregunta: "¿Cómo se llama el satélite natural de la Tierra?",
                respuestas: ["Sol", "Luna", "Europa", "Titán"],
                correcta: 1
            }
        ];
        let preguntaActual = 0;
        let puntaje = 0;

        const pregunta = document.getElementById("pregunta");
  
        const botones = document.querySelectorAll(".respuesta");
  
        const btnSiguiente = document.getElementById("btnSiguiente");
  
        const quiz = document.getElementById("quiz");

        function cargarPregunta(){
            const actual = preguntas[preguntaActual];
            pregunta.textContent = actual.pregunta;
            botones.forEach((boton, index) => {
                boton.textContent = actual.respuestas[index];
                boton.classList.remove("correcta", "incorrecta");
                boton.disabled = false;
            });

            btnSiguiente.disabled = true;
        }
  
        botones.forEach((boton, index) => {
            boton.addEventListener("click", () => {
                const correcta = preguntas[preguntaActual].correcta;
                botones.forEach(btn => btn.disabled = true);

                if(index === correcta){
                    boton.classList.add("correcta");
                    puntaje++;
                }else{
                    boton.classList.add("incorrecta");
                    botones[correcta].classList.add("correcta");
                }

                btnSiguiente.disabled = false;

            });
        });

        btnSiguiente.addEventListener("click", () => {
            preguntaActual++;

            if(preguntaActual < preguntas.length){
                cargarPregunta();
            }else{
                quiz.innerHTML = `
                <div class="resultado">
                    <h1>¡Terminaste!</h1>
                    <p>Respondiste bien ${puntaje} de ${preguntas.length} preguntas.</p>
                    <button onclick="location.reload()">Jugar de nuevo</button>
                    </div>
                `;
            }
        })
        cargarPregunta();
        </script>
